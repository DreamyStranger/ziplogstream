name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "windows-latest"]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint (Ruff)
        run: ruff check .

      - name: Type check (MyPy)
        run: mypy src

      - name: Run tests
        run: pytest --cov=zip_logstream --cov-report=term-missing

  package:
    name: Package validation
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "windows-latest"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packaging tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: twine check dist/*

      # --- Smoke test: wheel ---
      - name: Smoke test (wheel)
        shell: bash
        run: |
          python -m venv .venv-wheel
          . .venv-wheel/bin/activate
          python -m pip install --upgrade pip
          pip install --no-cache-dir dist/*.whl
          python - <<'PY'
          import importlib.resources as resources
          import zip_logstream
          from zip_logstream import LineStreamer

          print("version:", zip_logstream.__version__)
          print("LineStreamer import ok")

          py_typed = resources.files("zip_logstream").joinpath("py.typed")
          assert py_typed.is_file(), "py.typed missing"
          print("py.typed present")
          PY

      # --- Smoke test: sdist ---
      - name: Smoke test (sdist)
        shell: bash
        run: |
          python -m venv .venv-sdist
          . .venv-sdist/bin/activate
          python -m pip install --upgrade pip
          pip install --no-cache-dir dist/*.tar.gz
          python - <<'PY'
          import importlib.resources as resources
          import zip_logstream
          from zip_logstream import LineStreamer

          print("version:", zip_logstream.__version__)
          print("LineStreamer import ok")

          py_typed = resources.files("zip_logstream").joinpath("py.typed")
          assert py_typed.is_file(), "py.typed missing"
          print("py.typed present")
          PY
